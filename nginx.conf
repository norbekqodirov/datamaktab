server {
    listen 80;
    server_name datamaktab.uz www.datamaktab.uz;

    # Redirect www to non-www
    if ($host = www.datamaktab.uz) {
        return 301 https://datamaktab.uz$request_uri;
    }

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name datamaktab.uz www.datamaktab.uz;

    ssl_certificate     /etc/letsencrypt/live/datamaktab.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/datamaktab.uz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Gzip settings
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml;
    gzip_min_length 1024;

    # Static uploads — long cache
    location /uploads/ {
        alias /var/www/datamaktab/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static public assets
    location /public/ {
        alias /var/www/datamaktab/public/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Proxy all other requests to Node.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 20M;
    }
}
